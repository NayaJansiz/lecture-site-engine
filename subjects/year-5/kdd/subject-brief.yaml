schema_version: "1.0"

subject:
  id: kdd
  name_ar: "اكتشاف المعرفة في قواعد البيانات"
  name_en: "Knowledge Discovery in Databases"
  tagline: "تنقيب + تصنيف + تجميع + تنبؤ"
  section_label: "القسم العملي"

locale:
  language: ar
  direction: rtl
  terms_in_backticks: true
  inline_code_comments: english
  extra_explanation_tag: "(شرح زيادة للفهم)"
  not_in_lecture_tag: "(غير مشروحة في المحاضرة)"

domain: mixed

domain_profile:
  content_types:
    - theory
    - code
    - diagrams
    - tables
    - pseudocode
    - equations
  forbid_adding: []
  prerequisites: []

lecture:
  unit_label: "المحاضرة"
  split_regex: "^# المحاضرة "
  title_pattern: "# {unit_label} {num} — {title_en} ({title_ar})"
  intro_blockquote: true

parts:
  integration_map:
    enabled: true
    heading: "📌 خريطة التكامل (أين تقع هذه المحاضرة في الدورة؟)"

  detail:
    enabled: true
    heading: "الجزء الأول: الشرح التفصيلي (سطر بسطر / فقرة بفقرة)"
    numbered_sections: true
    require_per_section:
      - original_quote
      - simplified_explanation

  summary:
    enabled: true
    heading: "الجزء الثاني: ملخص منظم"
    subsections:
      - definitions_table
      - components_table
      - comparisons_table
      - glossary
      - golden_points
      - common_mistakes_table
      - patterns
      - main_ideas

  mcq:
    enabled: true
    heading: "الجزء الثالث: أسئلة اختيار من متعدد (MCQ)"
    count: 16
    min_count: 14
    difficulty: [medium, hard]
    forbid_easy_literal: false
    distribution:
      comparisons: 25
      code_scenario: 30      # Python/SQL + مخرجات خوارزمية
      application: 30
      algorithm_trace: 15    # تتبع Apriori، k-Means، Decision Tree

  debug:
    enabled: true
    heading: "الجزء الرابع: أسئلة تصحيح الكود"
    count: 5
    cover: [logic, misconception, return_check, dead_code]

  exercise:
    enabled: true
    heading: "الجزء الرابع: تمارين تطبيقية (من إعداد الدليل للتدريب)"
    count_min: 5
    count_max: 8
    authored_by_guide: true
    types:
      - fill_gaps
      - code_fix
      - scenario
      - metric_calculation    # حساب Support, Confidence, Entropy, F1
      - model_apply           # تطبيق k-Means أو Decision Tree على بيانات

  analysis_exercise:
    enabled: true
    heading: "الجزء الرابع: تمارين تحليل وتطبيق (إضافية — من إعداد الدليل)"
    count_min: 4
    count_max: 8
    types:
      - case_study
      - table_fill            # confusion matrix، itemsets، iterations
      - written_analysis
      - diagram_completion    # شجرة قرار، مخطط KDD pipeline

  trace_exercise:
    enabled: true
    heading: "الجزء الرابع: تمارين تتبع التنفيذ"
    count_min: 3
    note: "كل تمرين: بيانات/معطيات + جدول تكرارات ناقص + نموذج الحل — Apriori، k-Means، Gradient Descent"

  design_question:
    enabled: false
    heading: "الجزء الرابع: أسئلة تصميم"
    count_min: 1
    types:
      - er_diagram
      - uml_design
      - architecture
      - schema_design

  theory:
    enabled: true
    heading: "الجزء الخامس: أسئلة نظرية متوقعة بالامتحان"
    count_min: 8

  cheat_sheet:
    enabled: true
    heading: "الجزء السادس: ورقة المراجعة السريعة (Cheat Sheet)"
    subsections:
      - integration_map_table
      - golden_rules_table
      - quick_reference_tables

  qa_cards:
    enabled: true
    heading: "الجزء الرابع: بطاقات سؤال وجواب (Q&A Cards)"
    count_min: 14

  reference_code:
    enabled: true
    heading: "الجزء الخامس: كتابة الكود الكامل (مرجع شامل)"
    assemble_from_fragments: true
    same_program_only: false
    languages: [python]
    note: "يجمع كود المحاضرة: preprocessing، Apriori، regression، classification، clustering"

  checklist:
    enabled: true
    heading: "الجزء التاسع: قائمة فحص ذاتي قبل الامتحان ✅"

blocks:
  original_quote:
    enabled: true

  simplified_explanation:
    enabled: true

  code:
    enabled: true
    languages: [python, sql, r]
    require_line_explain: true

  line_explain:
    enabled: true
    format: numbered_list

  imports:
    enabled: true

  expected_output:
    enabled: true

  troubleshooting:
    enabled: true

  diagrams:
    enabled: true
    types: [flowchart, decision-tree]
    require_node_table: true
    require_edge_table: true

  uml:
    enabled: false
    types: [usecase, class, activity, flowchart]

  screen_description:
    enabled: false

  algorithm:
    enabled: true

  structured_english:
    enabled: true

  compare:
    enabled: true

  callouts:
    enabled: true

  think_prompt:
    enabled: true
    min_per_lecture: 3

  tables:
    enabled: true

  fill_gaps:
    enabled: true

  code_fix:
    enabled: true

  images_note:
    enabled: false

  qa_inline:
    enabled: true

  analogy:
    enabled: true

  trade_off:
    enabled: true

  before_after:
    enabled: true

  trace:
    enabled: true

  equations:
    enabled: true
    display_mode: block
    require_explanation: true
    common_symbols:
      - "Support"
      - "Confidence"
      - "Lift"
      - "Entropy"
      - "Information Gain"
      - "Gini Index"
      - "Gradient Descent"
      - "RSS"
      - "Bayes' Theorem"
      - "Minkowski Distance"
      - "Accuracy"
      - "Precision"
      - "Recall"
      - "F1"

pedagogy:
  cover_every_line: true
  complete_gaps: true
  beginner_friendly: true
  explain_why: true
  daily_analogy_plus_example: true
  follow_lecture_order: true
  adapt_to_lecture_type: true

  lecture_types:
    - match: "Association Rules & Frequent Patterns"
      tools: ["Apriori", "support", "confidence", "lift", "itemset", "transaction", "FIM", "ARM"]
    - match: "Regression"
      tools: ["Linear Regression", "RSS", "Gradient Descent", "R²", "RMSE", "Multiple Regression", "Polynomial Regression"]
    - match: "Classification"
      tools: ["Decision Tree", "Entropy", "Information Gain", "Gini Index", "Naive Bayes", "kNN", "SVM", "Confusion Matrix", "Precision", "Recall", "F1"]
    - match: "Clustering"
      tools: ["k-Means", "k-Medoids", "PAM", "k-Modes", "Euclidean Distance", "Manhattan Distance", "Silhouette", "Within-Cluster Variation"]
    - match: "Ensemble Methods"
      tools: ["Bagging", "Boosting", "AdaBoost", "Random Forest", "Bootstrap", "Voting", "Weighted Voting"]
    - match: "Data Preprocessing"
      tools: ["Missing Values", "Noise", "Normalization", "Binning", "Correlation", "Chi-Square", "Discretization"]

assessment:
  mcq_option_letters: arabic

automation_question_types:

  flash_qa:
    enabled: true
    label_ar: "مراجعة سريعة (سؤال / جواب)"
    difficulty: easy
    count_min: 14
    parts: [qa_cards, qa_inline, theory]
    blocks: [qa_inline, callouts]
    examples:
      - "ما الفرق بين `Classification` و `Clustering`؟"
      - "متى نستخدم `Precision` بدل `Accuracy`؟"

  scenario_cluster:
    enabled: true
    label_ar: "تحدي مركّب (سيناريو + أسئلة متعددة)"
    difficulty: hard
    count_min: 3
    questions_per_scenario: 4
    parts: [mcq, debug, theory]
    blocks: [code, trace, diagrams, tables, equations]
    scenario_sources:
      - code_trace
      - numerical_case
      - algorithm_state
    examples:
      - "جدول `Confusion Matrix` ناقص — احسب `F1`"
      - "كود `Apriori` — أي itemset يُقصى في التكرار التالي؟"
      - "بيانات `k-Means` — أي نقطة تنتقل لأي cluster؟"

  hands_on:
    enabled: true
    label_ar: "تطبيق عملي (أكمل / صحّح / نفّذ)"
    difficulty: medium
    count_min: 5
    parts: [exercise, analysis_exercise, debug]
    blocks: [fill_gaps, code_fix, algorithm, expected_output, tables]
    types:
      - fill_gaps
      - code_fix
      - table_fill
      - metric_calculation
      - model_apply

  step_trace:
    enabled: true
    label_ar: "تتبع خطوة بخطوة (جدول ناقص)"
    difficulty: medium
    count_min: 3
    parts: [trace_exercise, mcq]
    blocks: [trace, algorithm, tables, diagrams]
    trace_targets:
      - algorithm_iterations
      - variable_state

  compare_analyze:
    enabled: true
    label_ar: "مقارنة وتحليل"
    difficulty: medium
    count_min: 4
    parts: [mcq, theory, analysis_exercise]
    blocks: [compare, trade_off, tables]

  find_the_bug:
    enabled: true
    label_ar: "اكتشف الخطأ (كود / منطق / حساب)"
    difficulty: hard
    count_min: 4
    parts: [debug, exercise]
    blocks: [code_fix, troubleshooting]
    bug_types: [logic, misconception, wrong_formula, off_by_one]

  structured_theory:
    enabled: true
    label_ar: "نظري منظم"
    difficulty: medium
    count_min: 8
    parts: [theory, mcq]
    blocks: [compare, tables, callouts]

output:
  validation_footer: true
  schema_reference: "SCHEMA.md v1.0"
  closing_line: "ابدأ الآن. سأرسل المحاضرة في الرسالة التالية."
  checklist_items:
    - "غطّيت كل معلومة وردت في المحاضرة"
    - "كل قسم يبدأ بـ «النص الأصلي يقول» + «الشرح المبسّط»"
    - "الأقسام مرقّمة هرمياً (1، 1.1، 2 …)"
    - "استخدمت جداول لكل مقارنة وقائمة تعريفات"
    - "كل مصطلح إنجليزي بين backticks"
    - "≥16 سؤال MCQ مع تعليل كامل"
    - "≥5 أسئلة تصحيح كود Python"
    - "≥3 تمارين تتبع (Apriori، k-Means، Gradient Descent)"
    - "≥5 تمارين تطبيقية مع نموذج حل"
    - "≥14 بطاقة Q/A مراجعة سريعة"
    - "≥3 سيناريوهات مركّبة × 4 أسئلة MCQ لكل سيناريو"
    - "حسابات `Support`، `Confidence`، `Entropy`، `F1` مع أمثلة"
    - "قارنت بين خوارزميات التصنيف والتجميع"