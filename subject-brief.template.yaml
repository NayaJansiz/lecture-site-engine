# ═══════════════════════════════════════════════════════════════════════════════
# تعليمات للذكاء الاصطناعي (DeepSeek / Claude) — اقرأ قبل التعبئة
# ═══════════════════════════════════════════════════════════════════════════════
#
# مهمتك: املأ هذا القالب وارجع ملف YAML واحد فقط باسم subject-brief.yaml
# لا تشرح، لا تضف markdown، لا تولّد محتوى محاضرات — فقط إعدادات المادة.
#
# المدخلات التي سيرسلها المستخدم:
#   1) هذا القالب (subject-brief.template.yaml)
#   2) النظري الكامل للمادة (كل المحاضرات: PDF أو نص)
#
# ماذا تفعل:
#   - اقرأ كل المحاضرات وافهم: هل فيها أكواد؟ مخططات؟ أوامر CLI؟ جداول؟
#   - فعّل (enabled: true) الأجزاء (parts) والبلوكات (blocks) الموجودة فعلاً في المادة
#   - حاول قدر الإمكان تفعيل **أكبر عدد معقول** من البلوكات والأجزاء المهمّة للمادة —
#     لا تكتفِ بالحد الأدنى: إذا النوع متواجد أو مفيد لهذه المادة فعّله واضبط إعداداته
#   - عطّل (enabled: false) فقط ما لا يظهر أبداً ولا ينطبق على المادة
#   - اضبط count / count_min / count_max للأسئلة حسب حجم المادة
#   - اختر domain الصحيح: programming | analysis | theory | mixed
#   - املأ domain_profile.content_types و forbid_adding حسب اللغات/الأدوات الفعلية
#   - املأ subject (name_ar, name_en, tagline, section_label) من اسم المادة
#   - املأ lecture_types تحت pedagogy إذا adapt_to_lecture_type: true
#   - فعّل reference_code إذا المحاضرة تشرح برنامجاً واحداً على دفعات — يُجمَّع كود كامل في النهاية
#   - فعّل equations للمواد الرياضية (تعقيد، A* f(n), تكامل، إلخ)
#
# ═══ أولوية الأتمتة (الفحص كله أتمتة — هذا الأهم) ═══
#   الهدف: أكبر عدد ممكن من أسئلة/تمارين قابلة للتصحيح الآلي مع نموذج إجابة واضح.
#
#   فعّل دائماً إن أمكن:
#     mcq (≥16) | theory (≥8) | trace_exercise (≥3) | exercise (≥4) |
#     analysis_exercise | qa_cards (≥12) | checklist | fill_gaps | code_fix
#
#   فعّل حسب المادة:
#     programming  → code + debug + reference_code + imports + expected_output
#     analysis     → trace_exercise + table_fill + numerical_solve + equations + algorithm
#     theory/mixed → pseudocode + debug(logic) + algorithm_trace في MCQ + diagrams
#
#   ارفع count/count_min — لا تكتفِ بالحد الأدنى. كل جزء يحتاج نموذج حل كامل.
#   أضف في checklist_items بنوداً تتحقق من وجود كل نوع سؤال مفعّل.
#
#   توزيع MCQ المقترح للأتمتة:
#     comparisons 20–30% | code_scenario/algorithm_trace 30–40% | application 25–40%
#
#   املأ قسم automation_question_types — 6 أنواع جاهزة، فعّل ما يناسب المادة واضبط count_min.
#   كل نوع يربط parts + blocks + صيغة الإخراج — لا تكتفِ بالنظري فقط.
#
# قواعد صارمة:
#   - أبقِ schema_version: "1.0" كما هو
#   - لا تغيّر عناوين heading للأجزاء المفعّلة — الـ parser يعتمد عليها
#   - لا تخترع أجزاء غير موجودة في القالب (انظر القائمة أدناه)
#   - أرجع YAML صالح فقط — بدون ```yaml wrapper
#
# أجزاء المحاضرة (parts) — فعّل ما يناسب المادة فقط:
#   integration_map | detail | summary | mcq | debug | exercise |
#   analysis_exercise | trace_exercise | design_question |
#   qa_cards | reference_code | theory | checklist | cheat_sheet
#
# كتل الشرح (blocks) — فعّل كل ما يظهر أو يهم المادة (لا تقتصد بالتفعيل):
#   original_quote | simplified_explanation | code | line_explain | imports |
#   expected_output | troubleshooting | diagrams | uml | screen_description |
#   algorithm | structured_english | compare | callouts | think_prompt |
#   tables | fill_gaps | code_fix | images_note | qa_inline | analogy |
#   trade_off | before_after | trace | equations
#
# الناتج يُستخدم في الخطوة التالية:
#   subject-brief.yaml + meta-prompt.md → custom_prompt.md → استخراج parN.md من PDF
# ═══════════════════════════════════════════════════════════════════════════════

# Subject Brief Template — Lecture Site Engine v1.0
# Fill this file for your subject, then send it to meta-prompt with SCHEMA.md.
# Fields the AI reads: enabled, heading, count, difficulty, types, languages, format, flags.
# Fields marked [HUMAN ONLY] are for your reference — the AI ignores them.

schema_version: "1.0"

# ─── Subject identity ─────────────────────────────────────────────────────────
subject:
  id: my-subject                    # [HUMAN ONLY] slug for filenames
  name_ar: "اسم المادة بالعربي"
  name_en: "Subject Name in English"
  tagline: "كلمة + كلمة + كلمة + كلمة"  # 4-word summary shown in prompt header
  section_label: "القسم العملي"           # shown in intro blockquote — or "نظري"

# ─── Locale & terminology ─────────────────────────────────────────────────────
locale:
  language: ar
  direction: rtl
  terms_in_backticks: true          # true → wrap every English term: `Composable`
  inline_code_comments: english     # english | none — comment language inside code
  extra_explanation_tag: "(شرح زيادة للفهم)"
  not_in_lecture_tag: "(غير مشروحة في المحاضرة)"

# ─── Domain ───────────────────────────────────────────────────────────────────
# Controls what kind of content appears and whether lecture-type branching fires.
domain: programming                 # programming | analysis | theory | mixed

domain_profile:
  content_types:                    # list only types that actually appear
    - theory                        # definitions, principles
    - code                          # real programming languages
    - diagrams                      # BPMN, UML, flowcharts
    - commands                      # CLI tools (git, dotnet, bash)
    - tables                        # comparisons, data dictionaries
    - pseudocode                    # Structured English, analysis notation
    - equations                     # mathematical formulas (LaTeX/KaTeX)
  forbid_adding: []                 # language/tool names the AI must NOT invent
                                    # e.g. ["Java", "Python"] for analysis subjects
  prerequisites: []                 # assumed prior knowledge, shown in prompt header

# ─── Lecture heading — must match guide-config.js ────────────────────────────
lecture:
  unit_label: "المحاضرة"            # "المحاضرة" or "المختبر"
  split_regex: "^# المحاضرة "      # [HUMAN ONLY] used in guide-config.js
  title_pattern: "# {unit_label} {num} — {title_en} ({title_ar})"
  intro_blockquote: true            # true → > **المادة:** ... | **الموضوع:** ...

# ─── Parts ────────────────────────────────────────────────────────────────────
# Set enabled: true for the parts your subject needs.
# heading: must contain the keyword the parser regex matches (MCQ, تصحيح, تمارين, etc.)

parts:

  integration_map:
    enabled: false
    heading: "📌 خريطة التكامل (أين تقع هذه المحاضرة في الدورة؟)"

  detail:
    enabled: true
    heading: "الجزء الأول: الشرح التفصيلي (سطر بسطر / فقرة بفقرة)"
    numbered_sections: true         # require ### 1., ### 1.1. numbering
    require_per_section:            # optional — blocks required in every ### section
      - original_quote
      - simplified_explanation

  summary:
    enabled: true
    heading: "الجزء الثاني: ملخص منظم"
    # The summary must cover ALL main ideas from the lecture regardless of format.
    # patterns and main_ideas are always included when summary is enabled.
    subsections:
      - definitions_table
      - components_table
      - comparisons_table
      - glossary
      - golden_points
      - common_mistakes_table
      - patterns             # خطوات + أكواد + تعامل — see templates/part-summary.md
      - main_ideas           # catch-all: any key idea not captured above

  mcq:
    enabled: true
    heading: "الجزء الثالث: أسئلة اختيار من متعدد (MCQ)"
    count: 16                       # للأتمتة: ≥16 — لا تقل عن 14
    min_count: 14
    difficulty: [medium, hard]
    forbid_easy_literal: false
    distribution:                   # اضبط حسب المادة — أضف algorithm_trace أو numerical_trace إن لزم
      comparisons: 25
      code_scenario: 35
      application: 30
      algorithm_trace: 10           # اختياري — تتبع خطوة/مخرج خوارزمية

  debug:
    enabled: false                  # للأتمتة: فعّل إذا فيها كود أو pseudocode
    heading: "الجزء الرابع: أسئلة تصحيح الكود"
    count: 5
    cover: [logic, misconception, return_check, dead_code]

  exercise:
    enabled: true                   # للأتمتة: فعّل دائماً — تمارين مع نموذج حل
    heading: "الجزء الرابع: تمارين إضافية (من إعداد الدليل للتدريب)"
    count_min: 4
    count_max: 7
    authored_by_guide: true
    types:
      - fill_gaps
      - code_fix
      - scenario

  analysis_exercise:
    enabled: true                   # للأتمتة: جداول ناقصة + إكمال مخططات
    heading: "الجزء الرابع: تمارين تحليل وتطبيق (إضافية — من إعداد الدليل)"
    count_min: 3
    count_max: 6
    types:
      - case_study
      - diagram_completion
      - table_fill
      - written_analysis

  trace_exercise:
    enabled: true                   # للأتمتة: الأهم — جدول ناقص + نموذج حل
    heading: "الجزء الرابع: تمارين تتبع التنفيذ"
    count_min: 3
    note: "كل تمرين: مدخل + جدول/شجرة ناقصة للطالب + نموذج الحل الكامل"

  design_question:
    enabled: false
    heading: "الجزء الرابع: أسئلة تصميم"
    count_min: 1
    types:
      - er_diagram                  # entity-relationship design
      - uml_design                  # class / sequence / activity diagram
      - architecture                # system / layer / component design
      - schema_design               # database schema or data model

  theory:
    enabled: true
    heading: "الجزء الخامس: أسئلة نظرية متوقعة بالامتحان"
    count_min: 8                    # للأتمتة: ≥8 أسئلة مع نموذج إجابة

  cheat_sheet:
    enabled: true
    heading: "الجزء السادس: ورقة المراجعة السريعة (Cheat Sheet)"
    subsections:
      - integration_map_table
      - golden_rules_table
      - quick_reference_tables

  qa_cards:
    enabled: true                   # للأتمتة: مراجعة سريعة Q/A
    heading: "الجزء الرابع: بطاقات سؤال وجواب (Q&A Cards)"
    count_min: 12

  reference_code:
    enabled: false
    heading: "الجزء الخامس: كتابة الكود الكامل (مرجع شامل)"
    assemble_from_fragments: true   # if lecture splits one program across sections → merge at end
    same_program_only: true         # only when all fragments belong to the SAME code/project
    languages: []                   # e.g. [kotlin, java, python] — empty = infer from lecture
    note: ""                        # optional — extra instructions for meta-prompt

  checklist:
    enabled: true                   # للأتمتة: تحقق من اكتمال كل أنواع الأسئلة
    heading: "الجزء السادس: قائمة فحص ذاتي قبل الامتحان ✅"

# ─── Blocks ───────────────────────────────────────────────────────────────────
# Inline content types used inside parts.
# Marker strings are in SCHEMA.md — do not override them here.

blocks:

  original_quote:
    enabled: true                   # #### النص الأصلي يقول: — required per section

  simplified_explanation:
    enabled: true                   # #### الشرح المبسّط: — required per section

  code:
    enabled: false
    languages: []                   # e.g. [kotlin, xml, bash, csharp, c, python]
    require_line_explain: true      # must include شرح كل سطر after every code block

  line_explain:
    enabled: false
    format: numbered_list           # numbered_list | table

  imports:
    enabled: false                  # المكتبات المطلوبة — blockquote after each code

  expected_output:
    enabled: false                  # الناتج المتوقع — blockquote after each code

  troubleshooting:
    enabled: false                  # 🛠️ table: error | cause | fix

  diagrams:
    enabled: false
    types: [flowchart, bpmn, decision-tree, dfd]
    require_node_table: true
    require_edge_table: true

  uml:
    enabled: false
    types: [usecase, class, activity, flowchart]

  screen_description:
    enabled: false                  # 🖼️ text description for GIS/IDE screenshots

  algorithm:
    enabled: false                  # ⚙️ ordered procedures — one line per step in ```algorithm fence

  structured_english:
    enabled: false                  # IF/DO/UNTIL pseudocode — not real code

  compare:
    enabled: true                   # الفهم الخاطئ ❌ / الفهم الصحيح ✅

  callouts:
    enabled: true                   # مهم للامتحان | نقطة مهمة | ملاحظة | الدرس المستفاد

  think_prompt:
    enabled: true
    min_per_lecture: 3

  tables:
    enabled: true                   # mandatory for comparisons and definitions

  fill_gaps:
    enabled: true                   # للأتمتة: خطوات/كود ناقص — _______ أو // (N)

  code_fix:
    enabled: true                   # للأتمتة: كود خاطئ ثم مصحّح

  images_note:
    enabled: false                  # note slide/page number for lecture images

  qa_inline:
    enabled: false                  # **Q{N}:** / A: pairs inside detail

  analogy:
    enabled: true                   # 💡 التشبيه — daily-life analogy as a named highlighted block (use after every abstract concept)

  trade_off:
    enabled: true                  # ⚖️ المقايضة — both options valid, context decides (≠ compare block)

  before_after:
    enabled: true                  # 🔄 قبل / بعد — code or state before + after an operation

  trace:
    enabled: true                  # 🔍 تتبع التنفيذ — inline walk-through of execution step by step

  equations:
    enabled: false
    display_mode: block            # block | inline | both — how formulas appear
    require_explanation: true      # require **الشرح:** after each display equation
    common_symbols: []             # e.g. ["Work", "Span", "Ideal Parallelism", "Amdahl"]

# ─── Pedagogy flags ───────────────────────────────────────────────────────────
# Each true flag produces one Arabic rule bullet in the custom prompt.
pedagogy:
  cover_every_line: true
  complete_gaps: true
  beginner_friendly: true
  explain_why: true
  daily_analogy_plus_example: true
  follow_lecture_order: true
  adapt_to_lecture_type: true       # fires lecture_types branching if list is non-empty

  lecture_types: []
  # Uncomment and fill entries when adapt_to_lecture_type: true
  # Each entry produces one "إذا كانت عن X → استخدم Y" bullet.
  # Example:
  # - id: kotlin_basics              # optional slug
  #   match: "Kotlin Basics"
  #   tools: ["val/var", "main()", "fun", "String Template"]
  # - match: "State"
  #   tools: ["remember", "mutableStateOf", "State Hoisting"]

# ─── Assessment ───────────────────────────────────────────────────────────────
assessment:
  mcq_option_letters: arabic        # arabic (أ ب ج د) | latin (a b c d)

# ─── أنواع أسئلة الأتمتة ─────────────────────────────────────────────────────
# يحدد **أنواع** الأسئلة القابلة للتصحيح الآلي — ليس نظرياً فقط.
# فعّل الأنواع المناسبة للمادة واضبط count_min. كل نوع مفعّل يجب أن يظهر في المحاضرة.
# الـ AI يقرأ: enabled, count_min, parts, blocks, format — ويولّد المحتوى accordingly.

automation_question_types:

  # ── 1. مراجعة سريعة: سؤال ← جواب ← سؤال ← جواب ─────────────────────────────
  flash_qa:
    enabled: true
    label_ar: "مراجعة سريعة (سؤال / جواب)"
    difficulty: easy
    count_min: 12                   # لكل محاضرة: ≥12 بطاقة أو زوج inline
    parts: [qa_cards, qa_inline, theory]
    blocks: [qa_inline, callouts]
    format: |
      **Q{N}:** سؤال مراجعة مباشر (تعريف، فرق، متى نستخدم)
      **A:** إجابة مختصرة قابلة للمقارنة الآلية (جملة أو جملتان)
      — بدون تعليل طويل. مناسب للحفظ السريع قبل الامتحان.
    examples:
      - "ما الفرق بين `BFS` و `DFS`؟"
      - "متى نستخدم `LRU` بدل `FIFO`؟"

  # ── 2. تحدي صعب: سيناريو واحد + عدة أسئلة MCQ عليه ───────────────────────
  scenario_cluster:
    enabled: true
    label_ar: "تحدي مركّب (سيناريو + أسئلة متعددة)"
    difficulty: hard
    count_min: 3                    # 3 سيناريوهات × 3–5 أسئلة لكل سيناريو
    questions_per_scenario: 4
    parts: [mcq, debug, theory]
    blocks: [code, trace, diagrams, tables, compare, equations]
    format: |
      ### السيناريو {N}: {عنوان}
      > [وصف الحالة: كود، جدول، مخطط، أو مسألة رياضية كاملة — 5–10 أسطر]
      ثم 3–5 أسئلة MCQ **كلها مبنية على نفس السيناريو** (لا تكرر نفس الفكرة):
      ### السؤال {N}.1 (hard) … أ) ب) ج) د) + تعليل
      كل سيناريو يختبر: فهم + تطبيق + قرار (أي خطوة تالية؟ أي ناتج؟ أين الخطأ؟)
    scenario_sources:               # اختر ما ينطبق على المادة
      - code_trace                  # كود/pseudocode + ماذا يطبع؟ ماذا يحدث بعد التكرار؟
      - numerical_case              # معطيات رقمية + حساب خطوة أو ناتج نهائي
      - algorithm_state             # جدول frontier/closed أو تكرارات خوارزمية
      - logic_entailment            # قواعد منطقية + أي استنتاج صحيح؟
      - system_design               # وكيل/نظام + قرار تصميمي
    examples:
      - "جدول تكرارات `Newton-Raphson` ناقص — أي قيمة في الخلية X؟"
      - "كود `Minimax` مع alpha-beta — أي عقدة تُقصى؟"

  # ── 3. تطبيق عملي: الطالب ينفّذ أو يكمل ───────────────────────────────────
  hands_on:
    enabled: true
    label_ar: "تطبيق عملي (أكمل / صحّح / نفّذ)"
    difficulty: medium
    count_min: 5
    parts: [exercise, analysis_exercise, debug]
    blocks: [fill_gaps, code_fix, algorithm, expected_output, tables]
    types:
      - fill_gaps           # خطوات ناقصة في كود أو خوارزمية
      - code_fix            # كود خاطئ → مصحّح
      - table_fill          # إكمال جدول حسابي أو تكرارات
      - numerical_solve     # تطبيق طريقة كاملة على أرقام معطاة
      - diagram_completion  # إكمال عقد/حواف في مخطط
    format: |
      كل تمرين: **المعطيات** + **المطلوب** (مرقّم) + **نموذج الحل الكامل**
      الطالب يجيب بقيمة/جدول/كود — الإجابة قابلة للمقارنة حرفياً أو رقمياً.

  # ── 4. تتبع خطوة بخطوة: جدول ناقص + نموذج حل ─────────────────────────────
  step_trace:
    enabled: true
    label_ar: "تتبع خطوة بخطوة (جدول ناقص)"
    difficulty: medium
    count_min: 3
    parts: [trace_exercise, mcq]
    blocks: [trace, algorithm, tables, diagrams]
    format: |
      **المدخل:** {حالة ابتدائية}
      **أكمل الجدول:**
      | الخطوة | العملية | الحالة |
      | 1 | ... | ؟ |
      **نموذج الحل:** جدول مكتمل + **النتيجة النهائية**
      + 1–2 سؤال MCQ على نفس التتبع (ماذا في الخطوة 3؟)
    trace_targets:                  # فعّل ما ينطبق
      - algorithm_iterations        # BFS, DFS, Gauss, Bisection, Newton
      - variable_state              # قيم متغيرات بعد كل سطر تنفيذ
      - search_tree_expansion       # أي عقدة تُوسَّع تالياً؟
      - memory_page_replacement     # إطارات الذاكرة بعد كل page fault

  # ── 5. مقارنة وتحليل: اختر الأفضل / وضّح الفرق ───────────────────────────
  compare_analyze:
    enabled: true
    label_ar: "مقارنة وتحليل (أيهما أفضل؟ لماذا؟)"
    difficulty: medium
    count_min: 4
    parts: [mcq, theory, analysis_exercise]
    blocks: [compare, trade_off, tables, analogy]
    format: |
      سؤال مقارنة بخيارات (أ، ب، ج، د) + تعليل لماذا الباقي خاطئ
      أو جدول: | المعيار | الخيار A | الخيار B |
      أو تمرين تحليل: «في الحالة X استخدم Y لأن Z»

  # ── 6. اكتشف الخطأ: كود/منطق/حساب خاطئ ──────────────────────────────────
  find_the_bug:
    enabled: true
    label_ar: "اكتشف الخطأ (كود / منطق / حساب)"
    difficulty: hard
    count_min: 4
    parts: [debug, exercise]
    blocks: [code_fix, compare, troubleshooting]
    bug_types: [logic, misconception, off_by_one, wrong_formula, race_condition, infinite_loop]
    format: |
      **الكود/الحساب (يحتوي خطأ):** …
      **اكتشف الخطأ:** [وصف موجز]
      **التصحيح:** … + **شرح الحل** (3 نقاط)

  # ── 7. نظري منظم: تعريف + مكونات + مثال (قابل للتصحيح الجزئي) ─────────────
  structured_theory:
    enabled: true
    label_ar: "نظري منظم (تعريف + مكونات + مثال)"
    difficulty: medium
    count_min: 8
    parts: [theory, mcq]
    blocks: [compare, tables, callouts]
    format: |
